<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rhiannon Black — 3D portfolio world" />
    <meta name="theme-color" content="#f6c8d7" />
    <title>Rhiannon Black · Portfolio World</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="world-canvas"></canvas>

      <div class="bio-bar" id="bio-bar" aria-live="polite">
        <button class="bio-collapse" id="bio-collapse" type="button" aria-label="Collapse bio">−</button>
        <div class="bio-bar-content">
          <p class="bio-headline">
            <span class="bio-name">Rhiannon Black</span>
            <span class="bio-role">Developer</span>
          </p>
          <p class="bio-text">Creative developer and designer. Follow the trail to explore projects.</p>
        </div>
      </div>

      <aside class="controls-key" id="controls-key" aria-label="Controls">
        <div class="controls-key-body" id="controls-key-body">
          <p class="controls-key-title">Controls</p>
          <ul class="controls-key-list">
            <li><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move</li>
            <li><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> Perspective</li>
            <li><kbd>Mouse</kbd> Perspective (when cursor locked)</li>
            <li><kbd>Shift</kbd> Sprint</li>
            <li><kbd>Space</kbd> Jump</li>
            <li><kbd>Click</kbd> Lock / unlock cursor</li>
            <li><kbd>Esc</kbd> Free cursor</li>
          </ul>
        </div>
      </aside>

      <div class="zone-panel" id="zone-panel" hidden tabindex="-1">
        <button class="zone-close" id="zone-close" type="button" aria-label="Close">×</button>
        <p class="zone-tag" id="zone-tag"></p>
        <h2 id="zone-title"></h2>
        <p id="zone-body"></p>
        <div class="zone-links" id="zone-links"></div>
      </div>

      <div class="loading" id="loading">
        <div class="loading-inner">
          <span class="loading-spinner" aria-hidden="true"></span>
          <p>Loading…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
