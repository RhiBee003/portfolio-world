<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rhiannon Black — 3D portfolio world" />
    <meta name="theme-color" content="#f6c8d7" />
    <title>Rhiannon Black · Portfolio World</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="world-canvas"></canvas>

      <div class="hud">
        <div class="hud-brand">Rhiannon Black · Developer</div>
      </div>

      <aside class="controls-key" id="controls-key" aria-label="Controls">
        <button
          class="controls-key-toggle"
          id="controls-key-toggle"
          type="button"
          aria-expanded="true"
          aria-controls="controls-key-body"
          title="Toggle controls"
        >
          ?
        </button>
        <div class="controls-key-body" id="controls-key-body">
          <p class="controls-key-title">Controls</p>
          <ul class="controls-key-list">
            <li><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> Move</li>
            <li><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Look</li>
            <li><kbd>Shift</kbd> Sprint</li>
            <li><kbd>Space</kbd> Jump</li>
            <li><kbd>Click</kbd> Lock / unlock cursor</li>
            <li><kbd>Esc</kbd> Free cursor</li>
            <li><kbd>Mouse</kbd> Look when locked</li>
          </ul>
        </div>
      </aside>

      <div class="cursor-hint" id="cursor-hint" hidden>
        <span id="cursor-hint-text">Click to lock cursor</span>
      </div>

      <div class="zone-panel" id="zone-panel" hidden tabindex="-1">
        <button class="zone-close" id="zone-close" type="button" aria-label="Close">×</button>
        <p class="zone-tag" id="zone-tag"></p>
        <h2 id="zone-title"></h2>
        <p id="zone-body"></p>
        <div class="zone-links" id="zone-links"></div>
      </div>

      <div class="loading" id="loading">
        <div class="loading-inner">
          <span class="loading-spinner" aria-hidden="true"></span>
          <p>Loading…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
