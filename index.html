<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rhiannon Black — 3D portfolio world" />
    <meta name="theme-color" content="#f6c8d7" />
    <title>Rhiannon Black · Portfolio World</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="world-canvas"></canvas>

      <div class="hud">
        <div class="hud-brand">Rhiannon Black · Developer</div>
        <div class="hud-hint" id="hud-hint">
          <kbd>Mouse</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to explore ·
          <kbd>Shift</kbd> sprint · <kbd>Space</kbd> jump · click to look
        </div>
      </div>

      <div class="crosshair" id="crosshair" hidden aria-hidden="true"></div>

      <div class="zone-panel" id="zone-panel" hidden>
        <button class="zone-close" id="zone-close" type="button" aria-label="Close">×</button>
        <p class="zone-tag" id="zone-tag"></p>
        <h2 id="zone-title"></h2>
        <p id="zone-body"></p>
        <div class="zone-links" id="zone-links"></div>
      </div>

      <div class="loading" id="loading">
        <div class="loading-inner">
          <span class="loading-spinner" aria-hidden="true"></span>
          <p>Building the city…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
